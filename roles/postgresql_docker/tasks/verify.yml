---
- name: "Wait for ready"
  community.postgresql.postgresql_query:
    query: "SELECT 1"
    login_host: "{{ postgresql_docker_listen_addr }}"
    login_port: "{{ postgresql_docker_listen_port }}"
    login_user: "{{ postgresql_docker_bootstrap_user }}"
    login_password: "{{ postgresql_docker_bootstrap_pass }}"
    login_db: "{{ postgresql_docker_bootstrap_base }}"
  register: _postgresql_docker_result
  until: _postgresql_docker_result is succeeded
  retries: 60
  delay: 3
  tags:
    - postgresql
    - verify
