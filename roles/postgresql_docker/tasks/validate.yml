---
- name: "Ensure that variable is string"
  ansible.builtin.assert:
    that: lookup('vars', item) | type_debug in ["str", "string", "AnsibleUnicode", "AnsibleUnsafeText", "AnsibleVaultEncryptedUnicode"]
    quiet: true
    fail_msg: "The variable must be a string, but received {{ lookup('vars', item) | type_debug }}"
  loop:
    - postgresql_docker_version
    - postgresql_docker_tag
    - postgresql_docker_image
    - postgresql_docker_build_template
    - postgresql_docker_instance
    - postgresql_docker_network
    - postgresql_docker_timezone
    - postgresql_docker_conf_dir
    - postgresql_docker_data_dir
    - postgresql_docker_listen_addr
    - postgresql_docker_tls_cert_crt
    - postgresql_docker_tls_cert_key
  tags:
    - postgresql
    - validate


- name: "Ensure that variable is integer"
  ansible.builtin.assert:
    that: lookup('ansible.builtin.vars', item) | string | regex_search("^[0-9]+$") is not none
    quiet: true
    fail_msg: "The variable must be an integer, but received {{ lookup('vars', item) | type_debug }}"
  loop:
    - postgresql_docker_major_version
    - postgresql_docker_uid
    - postgresql_docker_gid
    - postgresql_docker_listen_port
  tags:
    - postgresql
    - validate


- name: "Ensure that variable is boolean"
  ansible.builtin.assert:
    that: lookup('vars', item) | type_debug == "bool"
    quiet: true
    fail_msg: "The variable must be a boolean"
  loop:
    - postgresql_docker_bind_mount_volumes
    - postgresql_docker_tls_enabled
  tags:
    - postgresql
    - validate


- name: "Ensure that variable is list"
  ansible.builtin.assert:
    that: lookup('vars', item) | type_debug in ["list", "AnsibleSequence"]
    quiet: true
    fail_msg: "The variable must be a list, but received {{ lookup('vars', item) | type_debug }}"
  loop:
    - postgresql_docker_extra_volumes
    - postgresql_docker_extra_users
    - postgresql_docker_pg_hba_conf_list
  tags:
    - postgresql
    - validate


- name: "Ensure that variable is dict"
  ansible.builtin.assert:
    that: lookup('vars', item) is mapping
    quiet: true
    fail_msg: "The variable must be a dictionary, but received {{ lookup('vars', item) | type_debug }}"
  loop:
    - postgresql_docker_compose_extra_conf
    - postgresql_docker_config
  tags:
    - postgresql
    - validate


- name: "Validating variable: password_encryption"
  ansible.builtin.assert:
    that: postgresql_docker_conf_runtime.password_encryption in ["scram-sha-256", "md5"]
    quiet: true
    fail_msg: "Invalid value: {{ postgresql_docker_conf_runtime.password_encryption }}"
  tags:
    - postgresql
    - validate


- name: "Check certificate variables length"
  ansible.builtin.assert:
    that: lookup('ansible.builtin.vars', item) | length > 1024
    quiet: true
  when: postgresql_docker_tls_enabled
  loop:
    - postgresql_docker_tls_cert_crt
    - postgresql_docker_tls_cert_key
  loop_control:
    label: "{{ item }}"
  tags:
    - postgresql
    - validate
